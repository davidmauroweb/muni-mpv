version: "3.9"

services:
  # Base de Datos (Sin puertos expuestos al exterior)
  db:
    image: postgres:16-alpine
    container_name: mapp_pg_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Clave1234}
    volumes:
      - ./db:/var/lib/postgresql/data

  # Laravel (PHP-FPM)
  backend:
    build:
      context: ./docker/php
    container_name: mapp_backend
    restart: always
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: mapp_frontend
      restart: always
      volumes:
        - frontend_static:/var/www/frontend # <--- CLAVE: El frontend escribe aquí

  nginx:
    image: nginx:alpine
    container_name: mapp_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - frontend_static:/var/www/frontend:ro # <--- CLAVE: Nginx lee de aquí
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  frontend_static: # <--- Hay que declararlo aquí abajo